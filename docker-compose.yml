# Coolify / 任意のDockerホスト用。
# Coolify では「Docker Compose」ビルドパックとして読み込めます。
services:
  keiro:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # 以下は Coolify の Environment Variables で設定する（compose にシークレットを書かない）
      BASE_URL: ${BASE_URL}
      SECRET: ${SECRET}
      OPERATOR_EMAIL: ${OPERATOR_EMAIL}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD}
      MATCH_WINDOW_SEC: ${MATCH_WINDOW_SEC:-1800}
      RETENTION_DAYS: ${RETENTION_DAYS:-90}
      TRIAL_DAYS: ${TRIAL_DAYS:-14}
      PLAN_NAME: ${PLAN_NAME:-スタンダード}
      PLAN_AMOUNT: ${PLAN_AMOUNT:-4980}
      UNIVAPAY_ENABLED: ${UNIVAPAY_ENABLED:-false}
      UNIVAPAY_APP_JWT: ${UNIVAPAY_APP_JWT}
      UNIVAPAY_SECRET: ${UNIVAPAY_SECRET}
      UNIVAPAY_STORE_ID: ${UNIVAPAY_STORE_ID}
      UNIVAPAY_WEBHOOK_TOKEN: ${UNIVAPAY_WEBHOOK_TOKEN}
      DB_PATH: /app/data/keiro.db
      BACKUP_DIR: /app/data/backups
    volumes:
      # SQLite を永続化（Coolifyでは Persistent Storage として /app/data を登録）
      - keiro-data:/app/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  keiro-data:

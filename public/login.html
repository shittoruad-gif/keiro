<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン｜Keiro</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <div class="center">
    <form class="card" id="form">
      <h1>ログイン</h1>
      <p class="lead">Keiro 管理画面</p>
      <div class="field"><label>メールアドレス</label><input name="email" type="email" autocomplete="username" required></div>
      <div class="field"><label>パスワード</label><input name="password" type="password" autocomplete="current-password" required></div>
      <button type="submit">ログイン</button>
      <p class="msg" id="msg"></p>
      <p class="alt"><a href="/forgot">パスワードを忘れた場合</a></p>
      <p class="alt">アカウントが無い方は <a href="/signup">新規登録</a></p>
    </form>
  </div>
  <script src="/assets/auth.js"></script>
  <script>initAuth('/auth/login');</script>
</body>
</html>

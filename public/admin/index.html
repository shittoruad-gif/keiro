<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Keiro 管理画面</title>
  <link rel="stylesheet" href="/admin/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <h1>Keiro</h1>
      <span class="sub">流入経路計測</span>
      <button id="refresh" class="ghost" type="button">更新</button>
    </div>
  </header>

  <main class="wrap">
    <!-- KPI -->
    <section class="kpis" id="kpis">
      <div class="kpi"><div class="kpi-label">クリック数</div><div class="kpi-val" id="kpi-clicks">–</div></div>
      <div class="kpi"><div class="kpi-label">友だち追加数</div><div class="kpi-val" id="kpi-follows">–</div></div>
      <div class="kpi"><div class="kpi-label">紐づけ率</div><div class="kpi-val" id="kpi-rate">–</div></div>
      <div class="kpi"><div class="kpi-label">ポストバック</div><div class="kpi-val" id="kpi-pb">–</div></div>
    </section>

    <!-- リンク作成 -->
    <section class="panel">
      <h2>計測リンクを作成</h2>
      <form id="link-form" class="form">
        <div class="field"><label>名前 *</label><input name="name" required placeholder="例) 6月Meta_動画A"></div>
        <div class="field"><label>友だち追加URL *</label><input name="oa_add_url" required placeholder="https://lin.ee/xxxxxxx"></div>
        <div class="field"><label>送信媒体</label>
          <input name="media" placeholder="meta,tiktok（空欄=有効な全媒体）">
        </div>
        <div class="field"><label>キャンペーン</label><input name="campaign" placeholder="任意"></div>
        <div class="field"><label>クリエイティブ</label><input name="creative" placeholder="任意"></div>
        <div class="field actions"><button type="submit">作成</button></div>
      </form>
      <p class="msg" id="link-msg"></p>
    </section>

    <!-- リンク一覧 -->
    <section class="panel">
      <h2>計測リンク</h2>
      <table class="grid" id="links-table">
        <thead>
          <tr>
            <th>名前</th><th>計測URL</th>
            <th class="num">クリック</th><th class="num">友だち追加</th><th class="num">CVR</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="links-body"><tr><td colspan="6" class="empty">読み込み中…</td></tr></tbody>
      </table>
    </section>

    <!-- 直近の友だち追加 -->
    <section class="panel">
      <h2>直近の友だち追加</h2>
      <table class="grid" id="follows-table">
        <thead>
          <tr><th>状態</th><th>LINE ID</th><th>判定方法</th><th>リンク</th><th>日時</th></tr>
        </thead>
        <tbody id="follows-body"><tr><td colspan="5" class="empty">読み込み中…</td></tr></tbody>
      </table>
    </section>
  </main>

  <!-- 絶対パスで読み込む（/admin と /admin/ でパスがずれて404になるのを防ぐ） -->
  <script src="/admin/dashboard.js"></script>
</body>
</html>
